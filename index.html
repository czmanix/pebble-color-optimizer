<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Pebble Photo Optimizer</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 20px; }
        h1 { color: #333; }
        .controls { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-wrap: wrap; }
        .control-group { display: flex; flex-direction: column; }
        .canvases { display: flex; gap: 15px; flex-wrap: wrap; }
        .canvas-container { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        canvas { border: 1px solid #ccc; image-rendering: pixelated; }
        label { font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #555; }
        
        /* Skryté obrázky pro načtení palet */
        #palettes { display: none; }
    </style>
</head>
<body>

   <h1>Pebble Photo Optimizer</h1>

<div class="controls">
        <div class="control-group">
            <label for="imageUpload">Upload Image:</label>
            <input type="file" id="imageUpload" accept="image/*">
        </div>
        <div class="control-group">
            <label for="refPalette">Reference Palette:</label>
            <select id="refPalette">
                <option value="sun">Sun</option>
                <option value="room">Room</option>
                <option value="backlight">Backlight</option>
                <option value="defined">Standard</option>
            </select>
        </div>
        <div class="control-group">
            <label for="ditherMode">Dithering:</label>
            <select id="ditherMode">
                <option value="atkinson">Atkinson</option>
                <option value="checkerboard">50:50 (Checkerboard)</option>
                <option value="off">Off (Nearest Color)</option>
            </select>
        </div>
        <div class="control-group">
            <label>Brightness:</label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="range" id="brightness" min="-100" max="100" value="0">
                <input type="number" id="brInput" min="-100" max="100" value="0" style="width: 55px;">
            </div>
        </div>
        <div class="control-group">
            <label>Contrast:</label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="range" id="contrast" min="-100" max="100" value="0">
                <input type="number" id="coInput" min="-100" max="100" value="0" style="width: 55px;">
            </div>
        </div>
        <div class="control-group" style="justify-content: center;">
            <button id="resetBtn" style="margin-top: 18px; padding: 5px 10px; cursor: pointer;">Reset to 0</button>
        </div>
    </div>

    <div class="canvases">
        <div class="canvas-container">
            <label>Original (Adjusted)</label><br>
            <canvas id="canvasOriginal" width="200" height="228"></canvas>
        </div>
        <div class="canvas-container">
            <label>Export (Standard)</label><br>
            <canvas id="canvasExport" width="200" height="228"></canvas>
        </div>
        <div class="canvas-container">
            <label>Sun</label><br>
            <canvas id="canvasSun" width="200" height="228"></canvas>
        </div>
        <div class="canvas-container">
            <label>Room</label><br>
            <canvas id="canvasRoom" width="200" height="228"></canvas>
        </div>
        <div class="canvas-container">
            <label>Backlight</label><br>
            <canvas id="canvasBacklight" width="200" height="228"></canvas>
        </div>
    </div>

    <div id="palettes">
        <img id="img-defined" src="defined.png" crossorigin="anonymous">
        <img id="img-sun" src="sun.png" crossorigin="anonymous">
        <img id="img-room" src="room.png" crossorigin="anonymous">
        <img id="img-backlight" src="backlight.png" crossorigin="anonymous">
    </div>

<script>
    // Úložiště pro vyextrahované barvy z palet (každá bude mít 64 barev)
    const palettesData = { defined: [], sun: [], room: [], backlight: [] };
    let sourceImage = null; // Uchová nahraný obrázek

    // Elementy
    // Elementy
    const upload = document.getElementById('imageUpload');
    const refPaletteSelect = document.getElementById('refPalette');
    const ditherModeSelect = document.getElementById('ditherMode');
    
    // Nové elementy pro jas a kontrast
    const brightnessSlider = document.getElementById('brightness');
    const contrastSlider = document.getElementById('contrast');
    const brInput = document.getElementById('brInput');
    const coInput = document.getElementById('coInput');
    const resetBtn = document.getElementById('resetBtn');

    const ctxOriginal = document.getElementById('canvasOriginal').getContext('2d', { willReadFrequently: true });
    const ctxExport = document.getElementById('canvasExport').getContext('2d');
    const ctxSun = document.getElementById('canvasSun').getContext('2d');
    const ctxRoom = document.getElementById('canvasRoom').getContext('2d');
    const ctxBacklight = document.getElementById('canvasBacklight').getContext('2d');

    // --- PROPOJENÍ SLIDERŮ A ČÍSELNÝCH POLÍ ---

    // Funkce pro aktualizaci jasu (reaguje na slider i na vepsání čísla)
    const updateBrightness = (e) => {
        let val = parseInt(e.target.value) || 0;
        val = Math.max(-100, Math.min(100, val)); // Ošetření hranic
        brightnessSlider.value = val;
        brInput.value = val;
        processImage();
    };
    brightnessSlider.addEventListener('input', updateBrightness);
    brInput.addEventListener('input', updateBrightness);

    // Funkce pro aktualizaci kontrastu
    const updateContrast = (e) => {
        let val = parseInt(e.target.value) || 0;
        val = Math.max(-100, Math.min(100, val)); // Ošetření hranic
        contrastSlider.value = val;
        coInput.value = val;
        processImage();
    };
    contrastSlider.addEventListener('input', updateContrast);
    coInput.addEventListener('input', updateContrast);

    // Tlačítko Reset
    resetBtn.addEventListener('click', () => {
        brightnessSlider.value = 0;
        brInput.value = 0;
        contrastSlider.value = 0;
        coInput.value = 0;
        processImage();
    });

    // Ostatní přepínače
    [refPaletteSelect, ditherModeSelect].forEach(el => {
        el.addEventListener('input', processImage);
    }); 
    
    

    // Po načtení stránky zpracujeme obrázky palet na datová pole
    window.onload = () => {
        ['defined', 'sun', 'room', 'backlight'].forEach(name => {
            extractColorsFromPalette(document.getElementById(`img-${name}`), name);
        });
        console.log("Palety načteny:", palettesData);
    };

    // Funkce pro získání 64 barev z 8x8 mřížky palety
    function extractColorsFromPalette(imgEl, name) {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = imgEl.width || 64;
        tempCanvas.height = imgEl.height || 64;
        const ctx = tempCanvas.getContext('2d');
        ctx.drawImage(imgEl, 0, 0);
        
        const cellW = tempCanvas.width / 8;
        const cellH = tempCanvas.height / 8;

        for (let y = 0; y < 8; y++) {
            for (let x = 0; x < 8; x++) {
                const px = ctx.getImageData(x * cellW + cellW/2, y * cellH + cellH/2, 1, 1).data;
                palettesData[name].push({ r: px[0], g: px[1], b: px[2] });
            }
        }
    }

    // Zpracování nahrání obrázku
    upload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            sourceImage = new Image();
            sourceImage.onload = processImage;
            sourceImage.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Event listenery pro posuvníky
    [brightnessSlider, contrastSlider, refPaletteSelect].forEach(el => {
        el.addEventListener('input', () => {
            if (el === brightnessSlider) brVal.innerText = el.value;
            if (el === contrastSlider) coVal.innerText = el.value;
            processImage();
        });
    });

    // Hlavní funkce pro zpracování pixelů (nyní s Floyd-Steinberg ditheringem)
    function processImage() {
        if (!sourceImage) return;

        const width = 200;
        const height = 228;

        // Vykreslíme a ořízneme původní obrázek do plátna Original (200x228)
        ctxOriginal.clearRect(0, 0, width, height);
        const scale = Math.max(width / sourceImage.width, height / sourceImage.height);
        const x = (width / 2) - (sourceImage.width / 2) * scale;
        const y = (height / 2) - (sourceImage.height / 2) * scale;
        ctxOriginal.drawImage(sourceImage, x, y, sourceImage.width * scale, sourceImage.height * scale);

        let imgData = ctxOriginal.getImageData(0, 0, width, height);
        let data = imgData.data;

        const br = parseInt(brightnessSlider.value);
        const co = parseInt(contrastSlider.value);
        const factor = (259 * (co + 255)) / (255 * (259 - co));

        const refName = refPaletteSelect.value;
        const refPalette = palettesData[refName];

        let expData = ctxExport.createImageData(width, height);
        let sunData = ctxSun.createImageData(width, height);
        let roomData = ctxRoom.createImageData(width, height);
        let backData = ctxBacklight.createImageData(width, height);

       // 1. FÁZE: Vytvoříme Float32Array pro přesné výpočty chyb ditheringu
        let floatData = new Float32Array(width * height * 3);
        for (let i = 0, j = 0; i < data.length; i += 4, j += 3) {
            let r = data[i] + br;
            let g = data[i+1] + br;
            let b = data[i+2] + br;

            r = factor * (r - 128) + 128;
            g = factor * (g - 128) + 128;
            b = factor * (b - 128) + 128;

            // OPRAVA ZDE: Než pustíme pixely do ditheringu, musíme je
            // striktně oříznout do reálného barevného spektra 0-255!
            r = Math.min(255, Math.max(0, r));
            g = Math.min(255, Math.max(0, g));
            b = Math.min(255, Math.max(0, b));

            // Uložíme do bufferu pro dithering (nyní již bezpečné hodnoty)
            floatData[j] = r;
            floatData[j+1] = g;
            floatData[j+2] = b;
            
            // Zároveň uložíme oříznuté hodnoty zpět pro zobrazení čistého originálu
            data[i] = r;
            data[i+1] = g;
            data[i+2] = b;
        }

        // 2. FÁZE: Zpracování pixelů a Dithering
        const ditherMode = ditherModeSelect.value;

        // 2. FÁZE: Zpracování pixelů a Dithering
        for (let py = 0; py < height; py++) {
            for (let px = 0; px < width; px++) {
                const idx = (py * width + px) * 3;
                
                let targetR = floatData[idx];
                let targetG = floatData[idx+1];
                let targetB = floatData[idx+2];

                // 1. Najdeme první nejbližší barvu (C1) pro náš cíl
                let minDistance1 = Infinity;
                let closestIndex1 = 0;

                for (let j = 0; j < 64; j++) {
                    const pr = refPalette[j].r;
                    const pg = refPalette[j].g;
                    const pb = refPalette[j].b;
                    
                    const dist = (targetR - pr)**2 + (targetG - pg)**2 + (targetB - pb)**2; 
                    
                    if (dist < minDistance1) {
                        minDistance1 = dist;
                        closestIndex1 = j;
                    }
                }

                let finalIndex = closestIndex1;

                // 2. Pokud je režim 50:50 šachovnice, najdeme optimální barvu do páru (C2)
                if (ditherMode === 'checkerboard') {
                    // C2 = 2 * Cíl - C1
                    let remR = targetR * 2 - refPalette[closestIndex1].r;
                    let remG = targetG * 2 - refPalette[closestIndex1].g;
                    let remB = targetB * 2 - refPalette[closestIndex1].b;

                    let minDistance2 = Infinity;
                    let closestIndex2 = 0;

                    for (let j = 0; j < 64; j++) {
                        const pr = refPalette[j].r;
                        const pg = refPalette[j].g;
                        const pb = refPalette[j].b;
                        
                        const dist = (remR - pr)**2 + (remG - pg)**2 + (remB - pb)**2; 
                        
                        if (dist < minDistance2) {
                            minDistance2 = dist;
                            closestIndex2 = j;
                        }
                    }

                    // Vykreslíme šachovnici (střídání C1 a C2)
                    if ((px + py) % 2 !== 0) {
                        finalIndex = closestIndex2;
                    }
                }

                // 3. Zapíšeme finální index do všech čtyř cílových pláten
                const outIdx = (py * width + px) * 4;
                setPixel(expData.data, outIdx, palettesData.defined[finalIndex]);
                setPixel(sunData.data, outIdx, palettesData.sun[finalIndex]);
                setPixel(roomData.data, outIdx, palettesData.room[finalIndex]);
                setPixel(backData.data, outIdx, palettesData.backlight[finalIndex]);

                // 4. Distribuci chyby (Atkinson) řešíme jen pro původní hodnoty
                if (ditherMode === 'atkinson') {
                    // Pozor: Zde odesíláme chybu proti finálně použité barvě (C1 z Atkinsona)
                    let errR = floatData[idx] - refPalette[finalIndex].r;
                    let errG = floatData[idx+1] - refPalette[finalIndex].g;
                    let errB = floatData[idx+2] - refPalette[finalIndex].b;

                    const distributeError = (x, y) => {
                        if (x >= 0 && x < width && y >= 0 && y < height) {
                            const targetIdx = (y * width + x) * 3;
                            floatData[targetIdx] += errR * 0.125;
                            floatData[targetIdx+1] += errG * 0.125;
                            floatData[targetIdx+2] += errB * 0.125;
                        }
                    };

                    distributeError(px + 1, py);      // Vpravo
                    distributeError(px + 2, py);      // O dva pixely vpravo
                    distributeError(px - 1, py + 1);  // Vlevo dole
                    distributeError(px,     py + 1);  // Dole
                    distributeError(px + 1, py + 1);  // Vpravo dole
                    distributeError(px,     py + 2);  // O dva pixely dole
                }
            }
        }

        // Vykreslíme data zpět do pláten
        ctxOriginal.putImageData(imgData, 0, 0);
        ctxExport.putImageData(expData, 0, 0);
        ctxSun.putImageData(sunData, 0, 0);
        ctxRoom.putImageData(roomData, 0, 0);
        ctxBacklight.putImageData(backData, 0, 0);
    }

    function setPixel(dataArray, index, colorObj) {
        dataArray[index] = colorObj.r;
        dataArray[index+1] = colorObj.g;
        dataArray[index+2] = colorObj.b;
        dataArray[index+3] = 255; // Plná neprůhlednost
    }
</script>
</body>
</html>
